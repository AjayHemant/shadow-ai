<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SentinelGate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #08090d;
            --surface: #0f1117;
            --surface2: #171923;
            --border: #1e2230;
            --text: #e8eaf0;
            --muted: #7a8299;
            --accent: #6c63ff;
            --block: #ff4d6d;
            --warn: #ffd166;
            --allow: #06d6a0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 340px;
            min-height: 200px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 18px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .logo {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
        }

        .brand-name {
            font-size: 16px;
            font-weight: 800;
        }

        .brand-name span {
            background: linear-gradient(135deg, #a78bfa, #6c63ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-sub {
            font-size: 10px;
            color: var(--muted);
            font-weight: 500;
            letter-spacing: .06em;
            text-transform: uppercase;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 18px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--allow);
            animation: pulse 2s infinite;
            display: inline-block;
            margin-right: 6px;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(6, 214, 160, .4);
            }

            50% {
                box-shadow: 0 0 0 5px rgba(6, 214, 160, 0);
            }
        }

        .status-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--allow);
        }

        .offline-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--block);
        }

        .offline-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--block);
            display: inline-block;
            margin-right: 6px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1px;
            background: var(--border);
        }

        .stat {
            background: var(--surface);
            text-align: center;
            padding: 14px 8px;
        }

        .stat-num {
            font-size: 24px;
            font-weight: 800;
        }

        .stat-lbl {
            font-size: 10px;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-top: 2px;
        }

        .blocked {
            color: var(--block);
        }

        .warned {
            color: var(--warn);
        }

        .allowed {
            color: var(--allow);
        }

        .recent-header {
            padding: 12px 18px 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }

        .alert-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .alert-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 18px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .alert-time {
            color: var(--muted);
            font-size: 10px;
            width: 52px;
            flex-shrink: 0;
        }

        .alert-dest {
            flex: 1;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 8px;
        }

        .action-badge {
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .06em;
            flex-shrink: 0;
        }

        .action-badge.BLOCK {
            background: rgba(255, 77, 109, .15);
            color: var(--block);
            border: 1px solid rgba(255, 77, 109, .3);
        }

        .action-badge.WARN {
            background: rgba(255, 209, 102, .12);
            color: var(--warn);
            border: 1px solid rgba(255, 209, 102, .25);
        }

        .action-badge.ALLOW {
            background: rgba(6, 214, 160, .1);
            color: var(--allow);
            border: 1px solid rgba(6, 214, 160, .2);
        }

        .empty {
            padding: 24px;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
        }

        .footer {
            padding: 12px 18px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            background: var(--surface);
        }

        .btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all .15s;
        }

        .btn-dash {
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            color: #fff;
        }

        .btn-dash:hover {
            opacity: .9;
        }

        .btn-clear {
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-clear:hover {
            color: var(--block);
            border-color: rgba(255, 77, 109, .3);
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">🛡️</div>
        <div>
            <div class="brand-name"><span>SentinelGate</span></div>
            <div class="brand-sub">DLP Engine</div>
        </div>
    </div>

    <div class="status-bar" id="statusBar">
        <div style="display:flex;align-items:center;">
            <span class="status-dot"></span>
            <span class="status-text">DLP Active — Monitoring all sites</span>
        </div>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-num blocked" id="numBlocked">—</div>
            <div class="stat-lbl">Blocked</div>
        </div>
        <div class="stat">
            <div class="stat-num warned" id="numWarned">—</div>
            <div class="stat-lbl">Warned</div>
        </div>
        <div class="stat">
            <div class="stat-num allowed" id="numAllowed">—</div>
            <div class="stat-lbl">Allowed</div>
        </div>
    </div>

    <div class="recent-header">Recent Alerts</div>
    <div class="alert-list" id="alertList">
        <div class="empty">Scanning for sensitive data…</div>
    </div>

    <div class="footer">
        <button class="btn btn-dash" onclick="openDash()">📊 Open Dashboard</button>
        <button class="btn btn-clear" onclick="clearAll()">🗑 Clear</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
